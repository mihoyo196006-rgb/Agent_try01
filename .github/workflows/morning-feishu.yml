name: Morning Feishu Plan

on:
  schedule:
    - cron: "30 20 * * *"
    - cron: "30 21 * * *"
    - cron: "30 22 * * *"
    - cron: "30 23 * * *"
    - cron: "30 0 * * *"
    - cron: "30 1 * * *"
  workflow_dispatch:
    inputs:
      target_date:
        description: "Optional DayFlow snapshot date to read, YYYY-MM-DD. Leave blank for yesterday."
        required: false
        type: string

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        if: github.event_name != 'schedule'
        with:
          node-version: "22"
      - name: Print GitHub schedule diagnostics
        run: |
          echo "event=${GITHUB_EVENT_NAME}"
          echo "sha=${GITHUB_SHA}"
          echo "dayflow_target_date=${DAYFLOW_TARGET_DATE:-<default-yesterday>}"
          echo "utc_now=$(date -u --iso-8601=seconds)"
          TZ=Asia/Shanghai date +"beijing_now=%Y-%m-%dT%H:%M:%S%z"
        env:
          DAYFLOW_TARGET_DATE: ${{ github.event.inputs.target_date }}
      - name: Run tests
        if: github.event_name != 'schedule'
        run: python -m unittest discover -s tests -v
      - name: Run Worker tests
        if: github.event_name != 'schedule'
        run: node --test tests/dayflow_cloud_worker.test.mjs
      - name: Run lightweight scheduled check
        if: github.event_name == 'schedule'
        run: python -m py_compile send_morning_plan.py read_dayflow_state.py build_phd_mainline.py
      - name: Send morning plan to Feishu
        env:
          FEISHU_APP_ID: cli_aaa0102e6a38dcff
          FEISHU_APP_SECRET: ${{ secrets.CLI_AAA0102E6A38DCFF }}
          FEISHU_USER_ID: ou_bcd723dafdadfc604e0b66b4e8bb9f32
          DAYFLOW_CLOUD_ENDPOINT: ${{ secrets.DAYFLOW_CLOUD_ENDPOINT }}
          DAYFLOW_READ_TOKEN: ${{ secrets.DAYFLOW_READ_TOKEN }}
          DAYFLOW_TARGET_DATE: ${{ github.event.inputs.target_date }}
          DAYFLOW_MANUAL_RUN: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}
          MESSAGE_UUID_SUFFIX: ${{ github.event_name == 'workflow_dispatch' && github.run_id || '' }}
          REQUIRE_BEIJING_SEND_WINDOW: ${{ github.event_name == 'schedule' && '1' || '0' }}
        run: python send_morning_plan.py
      - name: Commit delivery marker
        if: success()
        run: |
          if ls data/delivery/*.json >/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/delivery/*.json
            if ! git diff --cached --quiet; then
              git commit -m "Record Feishu delivery"
              git push
            fi
          fi
