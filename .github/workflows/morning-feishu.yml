name: Morning Feishu Plan

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Send morning plan to Feishu
        env:
          FEISHU_APP_ID: cli_aaa0102e6a38dcff
          FEISHU_APP_SECRET: ${{ secrets.CLI_AAA0102E6A38DCFF }}
          FEISHU_USER_ID: ou_bcd723dafdadfc604e0b66b4e8bb9f32
        run: python send_morning_plan.py
